<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Simulation - DOMES-Acoustics</title>
    <link rel="stylesheet" href="../../shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-bar">
        <div class="header-left">
            <a href="../../index.html" class="header-brand" style="text-decoration:none;">
                <div class="logo-box"></div>
                DOMES<span>Acoustics</span>
            </a>
        </div>
        <div class="header-right">
            <div class="btn-group">
                <div class="file-info">
                    <span class="file-name" id="fileNameDisplay">No File Selected</span>
                    <span class="file-status" id="statusText">Ready</span>
                </div>
            </div>
            <a href="../../index.html" class="menu-btn" title="Home">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <button class="menu-btn" id="themeToggleBtn" onclick="toggleTheme()"></button>
        </div>
    </header>

    <div class="app-container">
        <aside>
            <div class="nav-section-title">Signal Tools</div>
            <a href="../spectrum/index.html" class="nav-btn" id="navSpectrum">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                Spectrum View
            </a>
            <a href="../source-localization/index.html" class="nav-btn" id="navAudioSource">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                Source Localization
            </a>
            <a href="./index.html" class="nav-btn active" id="navImportData">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                Physical Simulation
            </a>
            <a href="../platform-deployment/index.html" class="nav-btn" id="navHistory">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H7l5 17"></path></svg>
                Platform Deployment
            </a>
            <a href="../environment-data/index.html" class="nav-btn" id="navLibrary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                Environment Data
            </a>
            <a href="../annotation-manager/index.html" class="nav-btn" id="navAnnotations">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5l-3.293 3.293a1 1 0 0 0-.293.707V10l-2 2v8"></path><path d="M15 5l-2.5 2.5"></path><path d="M4 17l1-1 4 4 4-4 1 1"></path></svg>
                Annotation Manager
            </a>

            <div class="nav-section-title">AI Assistants</div>
            <a href="../ai-assistant/index.html" class="nav-btn" id="navAiAssistant">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7c0 1.66 1.34 3 3 3s3-1.34 3-3V5a3 3 0 0 0-3-3z"></path><path d="M19 10a7 7 0 0 1-14 0"></path></svg>
                AI Assistant
            </a>

            <div class="nav-section-title">Documents</div>
            <a href="../user-guide/index.html" class="nav-btn" id="navUserGuide">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                User Guide
            </a>

            <div style="margin-top: auto; color: var(--text-sub); font-size: 0.8rem; text-align: center;">v1.2.0</div>
        </aside>

        <main>
            <div class="simulation-view">
                <div class="acoustic-layout">
                    <div class="acoustic-visualization">
                        <div class="vis-header">
                            <div class="vis-tabs">
                                <button class="vis-tab active" data-tab="heatmap">传播损失热力图</button>
                                <button class="vis-tab" data-tab="ssp">声速剖面图</button>
                                <button class="vis-tab" data-tab="tlcurve">TL 曲线图</button>
                            </div>

                            <div class="toolbox-dropdown-container" id="toolboxDropdown">
                                <button class="toolbox-trigger-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                                    工具箱 ▼
                                </button>
                                <div class="toolbox-menu">
                                    <button class="menu-item">导出结果 (CSV)</button>
                                    <button class="menu-item">导出图像 (PNG)</button>
                                    <div class="menu-separator"></div>
                                    <button class="menu-item">保存配置</button>
                                    <button class="menu-item">加载配置</button>
                                </div>
                            </div>
                        </div>

                        <div class="vis-plot-container" id="plotContainer">
                            <div class="plot-placeholder" id="placeholder">
                                <h2>声场传播损失 (Transmission Loss)</h2>
                                <p>设置参数并点击"计算声场"以生成结果。</p>
                            </div>
                            <canvas id="simulationCanvas" style="display:none;"></canvas>
                        </div>
                    </div>

                    <div class="acoustic-controls">
                        <div class="control-section-card">
                            <div class="section-title">核心模型配置</div>
                            <div class="card-content">
                                <label for="modelType" class="input-title">传播模型:</label>
                                <select id="modelType" class="model-select">
                                    <option value="ray">射线模型 (Ray Tracing)</option>
                                    <option value="normalmode">简正波 (Normal Mode)</option>
                                    <option value="parabolic">抛物近似 (Parabolic Eq.)</option>
                                </select>

                                <label for="srcDepth" class="input-title">声源深度 (m):</label>
                                <input type="number" id="srcDepth" value="10" min="0" step="1">

                                <label for="srcFreq" class="input-title">声源频率 (Hz):</label>
                                <input type="number" id="srcFreq" value="500" min="1" step="10">

                                <label for="srcLevel" class="input-title">声源级 (dB):</label>
                                <input type="number" id="srcLevel" value="180" min="50" step="5">

                                <label for="maxRange" class="input-title">最大距离 (km):</label>
                                <input type="number" id="maxRange" value="5" min="1" step="1">
                            </div>
                        </div>

                        <div class="control-section-card">
                            <div class="section-title">海洋环境参数</div>
                            <div class="card-content">
                                <label for="sspModel" class="input-title">声速剖面 (SSP):</label>
                                <select id="sspModel">
                                    <option value="default">默认负梯度</option>
                                    <option value="isothermal">等温层</option>
                                    <option value="munk">Munk剖面 (深海)</option>
                                </select>

                                <label for="bathymetry" class="input-title">海底深度 (m):</label>
                                <input type="number" id="bathymetry" value="100" min="10" step="10">

                                <label for="seaBottomType" class="input-title">海底类型:</label>
                                <select id="seaBottomType">
                                    <option value="silt">淤泥 (Silt)</option>
                                    <option value="sand">沙 (Sand)</option>
                                    <option value="clay">粘土 (Clay)</option>
                                </select>

                                <label for="depthGrid" class="input-title">深度网格分辨率 (m):</label>
                                <input type="number" id="depthGrid" value="1" min="0.1" step="0.1">
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button id="calculateBtn" class="primary-action-btn">计算声场</button>
                            <button id="resetBtn" class="secondary-action-btn">重置参数</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../shared.js"></script>
    <script src="script.js"></script>
</body>
</html>
